<div class="reset-password-page">
  <!-- Background collage + dark overlay -->
  <div class="bg"></div>

  <!-- PulseScreen logo -->
  <div class="logo">
    <mat-icon class="logo-icon">theaters</mat-icon>
    <span class="logo-text">PulseScreen</span>
  </div>

  <!-- The card -->
  <div class="reset-card">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below.</p>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="submit()" class="form">
      <!-- New Password Field -->
      <mat-form-field appearance="outline" class="field">
        <mat-label>New Password</mat-label>
        <input
          matInput
          [type]="showPassword ? 'text' : 'password'"
          formControlName="newPassword"
          placeholder="Enter new password"
          required
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="'Toggle password visibility'"
        >
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="resetPasswordForm.get('newPassword')?.hasError('required')">
          Password is required
        </mat-error>
        <mat-error *ngIf="resetPasswordForm.get('newPassword')?.hasError('minlength')">
          Password must be at least 6 characters
        </mat-error>
      </mat-form-field>

      <!-- Confirm Password Field -->
      <mat-form-field appearance="outline" class="field">
        <mat-label>Confirm Password</mat-label>
        <input
          matInput
          [type]="showConfirmPassword ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="Confirm new password"
          required
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="toggleConfirmPasswordVisibility()"
          [attr.aria-label]="'Toggle password visibility'"
        >
          <mat-icon>{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="resetPasswordForm.get('confirmPassword')?.hasError('required')">
          Please confirm your password
        </mat-error>
        <mat-error *ngIf="resetPasswordForm.hasError('passwordMismatch')">
          Passwords do not match
        </mat-error>
      </mat-form-field>

      <!-- Submit Button -->
      <button
        mat-raised-button
        type="submit"
        class="reset-btn"
        [disabled]="resetPasswordForm.invalid || loading"
      >
        <span *ngIf="!loading">Reset Password</span>
        <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
      </button>

      <!-- Back to login -->
      <div class="back-to-login">
        <span>Remember your password?</span>
        <a class="link" routerLink="/login">Sign In</a>
      </div>
    </form>
  </div>
</div>
