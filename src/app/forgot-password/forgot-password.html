<div class="auth-page">
  <div class="bg"></div>

  <div class="logo">
    <mat-icon class="logo-icon">movie</mat-icon>
    <span class="logo-text">Pudplanet</span>
  </div>

  <mat-card class="auth-card"  appearance="outlined">
    <h1>Forgot Password</h1>
    <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="submit()" class="form" novalidate>
      <mat-form-field appearance="outline" class="field">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" id="email" name="email">
        <mat-icon matPrefix>email</mat-icon>
        <mat-error *ngIf="forgotPasswordForm.get('email')?.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="forgotPasswordForm.get('email')?.hasError('email')">
          Please enter a valid email address
        </mat-error>
      </mat-form-field>

      <button mat-flat-button class="submit-btn" type="submit" [disabled]="loading || forgotPasswordForm.invalid">{{loading ? 'Sending...' : 'Send Reset Link'}}</button>

      <div class="back-to-login">
        <span>Remembered your password? <a routerLink="/login">Back to Login</a></span>
      </div>
    </form>
  </mat-card>
</div>
