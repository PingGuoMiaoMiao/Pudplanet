<div class="dialog-container">
  <div class="dialog-header">
    <h1>Change Password</h1>
  </div>

  <div class="dialog-content">
    <form [formGroup]="changePasswordForm" class="password-form">
      <div class="form-section">
        <h2 class="section-title">
          <mat-icon>lock</mat-icon>
          Security Information
        </h2>

        <div class="form-grid">
          <mat-form-field>
            <mat-label>Current Password</mat-label>
            <input matInput [type]="hideCurrent ? 'password' : 'text'" formControlName="currentPassword">
            <mat-icon matPrefix>lock-open</mat-icon>
            <button mat-icon-button type="button" (click)="hideCurrent = !hideCurrent" tabindex="-1">
              <mat-icon>{{ hideCurrent ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
            <mat-error *ngIf="changePasswordForm.get('currentPassword')?.invalid && changePasswordForm.get('currentPassword')?.touched">
              Current password is required.
            </mat-error>
          </mat-form-field>

          <mat-form-field>
            <mat-label>New Password</mat-label>
            <input matInput [type]="hideNew ? 'password' : 'text'" formControlName="newPassword">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button type="button" (click)="hideNew = !hideNew" tabindex="-1">
              <mat-icon>{{ hideNew ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
            <mat-error *ngIf="changePasswordForm.get('newPassword')?.hasError('required') && changePasswordForm.get('newPassword')?.touched">
              Password is required.
            </mat-error>
            <mat-error *ngIf="changePasswordForm.get('newPassword')?.hasError('minlength') && changePasswordForm.get('newPassword')?.touched">
              Password must be at least 6 characters.
            </mat-error>
          </mat-form-field>

          <mat-form-field>
            <mat-label>Confirm New Password</mat-label>
            <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmNewPassword">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button type="button" (click)="hideConfirm = !hideConfirm" tabindex="-1">
              <mat-icon>{{ hideConfirm ? 'visibility' : 'visibility_off' }}</mat-icon>
            </button>
            <mat-error *ngIf="changePasswordForm.get('confirmNewPassword')?.hasError('required') && changePasswordForm.get('confirmNewPassword')?.touched">
              Confirm password is required.
            </mat-error>
            <mat-error *ngIf="changePasswordForm.get('confirmNewPassword')?.hasError('passwordMismatch') && changePasswordForm.get('confirmNewPassword')?.touched">
              Passwords do not match.
            </mat-error>
          </mat-form-field>
        </div>
      </div>
    </form>
  </div>

  <div class="dialog-footer">
    <button mat-stroked-button color="primary" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="submit()" [disabled]="changePasswordForm.invalid || loading">
      <mat-icon *ngIf="loading" class="spinner-icon">hourglass_empty</mat-icon>
      {{ loading ? 'Changing...' : 'Change Password' }}
    </button>
  </div>
</div>
